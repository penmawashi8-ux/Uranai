name: 占いShortsボット

on:
  workflow_dispatch:
    inputs:
      sign:
        description: '星座名（省略時: おひつじ座）'
        default: 'おひつじ座'
        required: false
      upload:
        description: 'YouTubeにアップロードする'
        type: boolean
        default: false
  schedule:
    # 毎朝6:00 JST（= 21:00 UTC 前日）
    - cron: '0 21 * * *'

jobs:
  fortune-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: fortune_bot/requirements.txt

      - name: 依存パッケージのインストール
        run: pip install -r fortune_bot/requirements.txt

      - name: .env を作成
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: |
          printf 'GEMINI_API_KEY=%s\nYOUTUBE_CLIENT_ID=%s\nYOUTUBE_CLIENT_SECRET=%s\nCHANNEL_NAME=占い動画チャンネル\n' \
            "$GEMINI_API_KEY" "$YOUTUBE_CLIENT_ID" "$YOUTUBE_CLIENT_SECRET" \
            > fortune_bot/.env

      - name: token.json を作成
        env:
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          data = {
              "token": "",
              "refresh_token": os.environ["YOUTUBE_REFRESH_TOKEN"].strip(),
              "token_uri": "https://oauth2.googleapis.com/token",
              "client_id": os.environ["YOUTUBE_CLIENT_ID"].strip(),
              "client_secret": os.environ["YOUTUBE_CLIENT_SECRET"].strip(),
              "scopes": ["https://www.googleapis.com/auth/youtube.upload"],
          }
          with open("fortune_bot/token.json", "w") as f:
              json.dump(data, f)
          print("token.json 作成完了")
          PYEOF

      - name: セットアップ（フォント・背景画像生成）
        run: cd fortune_bot && python setup.py

      - name: 運勢テキスト生成（Gemini API）
        run: cd fortune_bot && python generate_fortune.py

      - name: 動画生成
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            cd fortune_bot && python main.py --test --all
          else
            SIGN="${{ github.event.inputs.sign }}"
            SIGN="${SIGN:-おひつじ座}"
            cd fortune_bot && python main.py --test --sign "$SIGN"
          fi

      - name: 生成した動画をアーティファクトに保存
        uses: actions/upload-artifact@v4
        with:
          name: fortune-video
          path: fortune_bot/output/*.mp4
          retention-days: 3

      - name: YouTubeアップロード
        if: ${{ github.event_name == 'schedule' || github.event.inputs.upload == 'true' }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            cd fortune_bot && python main.py --all
          else
            SIGN="${{ github.event.inputs.sign }}"
            SIGN="${SIGN:-おひつじ座}"
            cd fortune_bot && python main.py --sign "$SIGN"
          fi

      - name: ログをアーティファクトに保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs-${{ github.run_id }}
          path: |
            fortune_bot/logs/
            fortune_bot/output/fortune_*.json
          retention-days: 7
          if-no-files-found: ignore

      - name: 実行結果をIssueにコメント
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
        run: python3 fortune_bot/post_comment.py
