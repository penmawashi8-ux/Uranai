name: 占いShortsボット

on:
  workflow_dispatch:
    inputs:
      sign:
        description: '星座名（省略時: おひつじ座）'
        default: 'おひつじ座'
        required: false
      upload:
        description: 'YouTubeにアップロードする'
        type: boolean
        default: false
  schedule:
    # 毎朝6:00 JST（= 21:00 UTC 前日）
    - cron: '0 21 * * *'

jobs:
  fortune-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: fortune_bot/requirements.txt

      - name: 依存パッケージのインストール
        run: pip install -r fortune_bot/requirements.txt

      - name: .env を作成
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: |
          printf 'GEMINI_API_KEY=%s\nYOUTUBE_CLIENT_ID=%s\nYOUTUBE_CLIENT_SECRET=%s\nCHANNEL_NAME=占い動画チャンネル\n' \
            "$GEMINI_API_KEY" "$YOUTUBE_CLIENT_ID" "$YOUTUBE_CLIENT_SECRET" \
            > fortune_bot/.env

      - name: token.json を作成
        env:
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          data = {
              "token": "",
              "refresh_token": os.environ["YOUTUBE_REFRESH_TOKEN"].strip(),
              "token_uri": "https://oauth2.googleapis.com/token",
              "client_id": os.environ["YOUTUBE_CLIENT_ID"].strip(),
              "client_secret": os.environ["YOUTUBE_CLIENT_SECRET"].strip(),
              "scopes": ["https://www.googleapis.com/auth/youtube.upload"],
          }
          with open("fortune_bot/token.json", "w") as f:
              json.dump(data, f)
          print("token.json 作成完了")
          PYEOF

      - name: セットアップ（フォント・背景画像生成）
        run: cd fortune_bot && python setup.py

      - name: 運勢テキスト生成（Gemini API）
        run: cd fortune_bot && python generate_fortune.py

      - name: 動画生成
        run: |
          SIGN="${{ github.event.inputs.sign }}"
          SIGN="${SIGN:-おひつじ座}"
          cd fortune_bot && python main.py --test --sign "$SIGN"

      - name: 生成した動画をアーティファクトに保存
        uses: actions/upload-artifact@v4
        with:
          name: fortune-video
          path: fortune_bot/output/*.mp4
          retention-days: 3

      - name: YouTubeアップロード
        if: ${{ github.event.inputs.upload == 'true' }}
        run: |
          SIGN="${{ github.event.inputs.sign }}"
          SIGN="${SIGN:-おひつじ座}"
          cd fortune_bot && python main.py --sign "$SIGN"

      - name: ログをアーティファクトに保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs-${{ github.run_id }}
          path: |
            fortune_bot/logs/
            fortune_bot/output/fortune_*.json
          retention-days: 7
          if-no-files-found: ignore

      - name: 実行結果をIssueにコメント
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import json, os, glob, urllib.request
          from datetime import datetime, timezone, timedelta

          run_id   = os.environ['RUN_ID']
          status   = os.environ['JOB_STATUS']
          repo     = os.environ['REPO']
          token    = os.environ['GITHUB_TOKEN']
          jst      = datetime.now(timezone(timedelta(hours=9))).strftime('%Y-%m-%d %H:%M JST')
          run_url  = f"https://github.com/{repo}/actions/runs/{run_id}"

          lines = [f"## {jst} — {status}", "", f"[▶ Actionsログを見る]({run_url})", ""]

          jsons = sorted(glob.glob("fortune_bot/output/fortune_*.json"))
          if jsons:
              try:
                  data = json.load(open(jsons[-1]))
                  fb = sum(1 for f in data if f.get('hook') == '今日も運気上昇中')
                  lines += ["### 運勢生成結果", "```",
                            f"API成功: {len(data)-fb}/12  フォールバック: {fb}/12"]
                  for f in data:
                      mark = '⚠️' if f.get('hook') == '今日も運気上昇中' else '✅'
                      lines.append(f"{mark} {f['sign']}: {f['hook']}")
                  lines += ["```", ""]
              except Exception as e:
                  lines.append(f"(JSON解析失敗: {e})")

          logs = sorted(glob.glob("fortune_bot/logs/*.log"))
          if logs:
              lines += ["### ログ", "```"]
              for lf in logs:
                  lines += open(lf).read().splitlines()
              lines.append("```")

          body = "\n".join(lines)
          payload = json.dumps({"body": body}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/5/comments",
              data=payload,
              headers={"Authorization": f"token {token}", "Content-Type": "application/json"},
          )
          resp = urllib.request.urlopen(req)
          print(f"コメント投稿完了: HTTP {resp.status}")
          PYEOF
