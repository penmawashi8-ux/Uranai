name: 占いShortsボット

on:
  workflow_dispatch:
    inputs:
      sign:
        description: '星座名（省略時: おひつじ座）'
        default: 'おひつじ座'
        required: false
      upload:
        description: 'YouTubeにアップロードする'
        type: boolean
        default: false
  schedule:
    # 毎朝6:00 JST（= 21:00 UTC 前日）
    - cron: '0 21 * * *'

jobs:
  fortune-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: fortune_bot/requirements.txt

      - name: 依存パッケージのインストール
        run: pip install -r fortune_bot/requirements.txt

      - name: .env を作成
        run: |
          cat > fortune_bot/.env << 'ENVEOF'
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}
          CHANNEL_NAME=占い動画チャンネル
          ENVEOF

      - name: token.json を作成
        run: |
          cat > fortune_bot/token.json << 'TOKENEOF'
          {
            "token": "",
            "refresh_token": "${{ secrets.YOUTUBE_REFRESH_TOKEN }}",
            "token_uri": "https://oauth2.googleapis.com/token",
            "client_id": "${{ secrets.YOUTUBE_CLIENT_ID }}",
            "client_secret": "${{ secrets.YOUTUBE_CLIENT_SECRET }}",
            "scopes": ["https://www.googleapis.com/auth/youtube.upload"]
          }
          TOKENEOF

      - name: セットアップ（フォント・背景画像生成）
        run: cd fortune_bot && python setup.py

      - name: 運勢テキスト生成（Gemini API）
        run: cd fortune_bot && python generate_fortune.py

      - name: 動画生成
        run: |
          SIGN="${{ github.event.inputs.sign }}"
          SIGN="${SIGN:-おひつじ座}"
          cd fortune_bot && python main.py --test --sign "$SIGN"

      - name: 生成した動画をアーティファクトに保存
        uses: actions/upload-artifact@v4
        with:
          name: fortune-video
          path: fortune_bot/output/*.mp4
          retention-days: 3

      - name: YouTubeアップロード
        if: ${{ github.event.inputs.upload == 'true' }}
        run: |
          SIGN="${{ github.event.inputs.sign }}"
          SIGN="${SIGN:-おひつじ座}"
          cd fortune_bot && python main.py --sign "$SIGN"
